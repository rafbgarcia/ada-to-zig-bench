name: Benchmarks

on:
  workflow_dispatch:

concurrency:
  group: benchmarks-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-missing-benchmarks:
    runs-on: ubuntu-24.04
    outputs:
      has-missing-benchmarks: ${{ steps.missing-benchmarks.outputs.has-missing-benchmarks }}
      missing-servers: ${{ steps.missing-benchmarks.outputs.missing-servers }}
    env:
      CLIENT_CONNECTIONS: '8192'
      PAYLOAD_BYTES: '256'
      PAYLOAD_SWEEP_BYTES: '256 4096 8192'
      PAYLOAD_SWEEP_SECONDS: '10'
      WARMUP_SECONDS: '5'
      WARMUP_REQUESTS_PER_SECOND: '1000'
      REQUESTS_PER_SECOND: '50000'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for missing benchmarks
        id: missing-benchmarks
        run: |
          mapfile -t missing_servers < <(scripts/run-latitude-benchmarks.sh --list-missing)

          if [ "${#missing_servers[@]}" -eq 0 ]; then
            echo "All servers already have benchmark artifacts."
            echo "has-missing-benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "missing-servers=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Missing benchmark artifacts for:\n'
          printf '  %s\n' "${missing_servers[@]}"

          missing_servers_list="$(printf '%s\n' "${missing_servers[@]}" | paste -sd ' ' -)"
          echo "has-missing-benchmarks=true" >> "$GITHUB_OUTPUT"
          echo "missing-servers=$missing_servers_list" >> "$GITHUB_OUTPUT"

  run-missing-benchmarks:
    needs: check-missing-benchmarks
    if: needs.check-missing-benchmarks.outputs.has-missing-benchmarks == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      SERVER_NAMES: ${{ needs.check-missing-benchmarks.outputs.missing-servers }}
      LATITUDESH_TOKEN: ${{ secrets.LATITUDESH_TOKEN }}
      LATITUDE_PROJECT: 'default-project'
      LATITUDE_SSH_KEYS: ${{ vars.LATITUDE_SSH_KEYS }}
      LATITUDE_SITE: 'ASH'
      LATITUDE_SERVER_PLAN: 'f4-metal-small' # AMD 4484PX | 12 Cores @ 4.4 GHz | 96GB RAM | 2 x 960 GB NVM-e
      LATITUDE_LOADGEN_PLAN: 'f4-metal-small'
      LATITUDE_OPERATING_SYSTEM: 'ubuntu_24_04_x64_lts'
      LATITUDE_BILLING: 'hourly'
      SSH_USER: 'ubuntu'
      SSH_READY_TIMEOUT_SECONDS: '600'
      CLIENT_CONNECTIONS: '8192'
      PAYLOAD_BYTES: '256'
      PAYLOAD_SWEEP_BYTES: '256 4096 8192'
      PAYLOAD_SWEEP_SECONDS: '20'
      WARMUP_SECONDS: '10'
      WARMUP_REQUESTS_PER_SECOND: '1000'
      REQUESTS_PER_SECOND: '50000'
      LATITUDE_SSH_PRIVATE_KEY: ${{ secrets.LATITUDE_SSH_PRIVATE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure SSH key for Latitude hosts
        run: |
          test -n "$LATITUDESH_TOKEN"
          test -n "$LATITUDE_SSH_KEYS"
          test -n "$LATITUDE_SSH_PRIVATE_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$LATITUDE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Latitude CLI
        run: |
          curl -fsSL https://cli.latitude.sh/install.sh | sh
          echo "$HOME/.lsh" >> "$GITHUB_PATH"
          "$HOME/.lsh/lsh" --version

      - name: Install web and deployment dependencies
        run: npm ci --prefix web

      - name: Run missing Latitude benchmarks
        run: scripts/run-latitude-benchmarks.sh

      - name: Build static web assets
        run: npm run build --prefix web

      - name: Commit benchmark artifacts
        run: |
          if [ -z "$(git status --porcelain -- servers)" ]; then
            echo "No benchmark artifacts changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add servers
          git commit -m "Update benchmark artifacts [skip ci]"
          git push origin HEAD:main
